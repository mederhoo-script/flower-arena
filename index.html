<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Paradise - Flower Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Floral Paradise</h1>
        
    </header>

    <main>
        <section id="today" class="carousel-section">
            <h2>Today's Products</h2>
            <div id="today-carousel" class="carousel"></div>
        </section>

        <section id="yesterday" class="carousel-section">
            <h2>Yesterday's Products</h2>
            <div id="yesterday-carousel" class="carousel"></div>
        </section>

        <section id="third-day" class="carousel-section">
            <h2>Third Day Products</h2>
            <div id="third-day-carousel" class="carousel"></div>
        </section>
        <section class="bottom-carousel-section">
            <h2>All Products</h2>
            <div id="bottom-carousel" class="bottom-carousel"></div>
        </section>

        <section id="events" class="events-section">
            <h2>Upcoming Events</h2>
            <div id="events-grid" class="events-grid"></div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
